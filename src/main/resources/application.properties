spring.application.name=fluxOn

spring.datasource.url=jdbc:postgresql://localhost:5432/fluxon
spring.datasource.username=postgres
spring.datasource.password=161003

api.security.token.secret=${JWT_SECRET:my-secret-key}
server.address=0.0.0.0

spring.jpa.open-in-view=false

# spring.jpa.open-in-view está ativada por padrăo. Isso permite consultas ao banco durante a renderizaçăo da view, o que pode causar problemas de performance ou transaçăo.
# Transaçőes longas: A sessăo do banco fica aberta por mais tempo, aumentando o risco de bloqueios e lentidăo.
# LazyInitializationException: Se a sessăo for fechada antes de acessar dados lazy, ocorre erro.
# Vazamento de recursos: Mais conexőes abertas podem sobrecarregar o banco.
# Dificuldade de rastrear queries: Consultas podem ser disparadas fora do controller, dificultando o controle e debug.